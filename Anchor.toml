[toolchain]
anchor_version = "0.32.1"

[features]
resolution = true
skip-lint = false

[programs.devnet]
sigil = "4ZeVCqnjUgUtFrHHPG7jELUxvJeoVGHhGNgPrhBPwrHL"

[programs.localnet]
sigil = "4ZeVCqnjUgUtFrHHPG7jELUxvJeoVGHhGNgPrhBPwrHL"
# mock_defi is not registered here because it is not built by anchor build.
# Its compiled .so lives as a committed fixture (tests/fixtures/mock-defi.so)
# and is loaded directly by LiteSVM via addProgramFromFile. See root
# Cargo.toml for the CI-compatibility rationale.

[registry]
url = "https://api.apr.dev"

[provider]
cluster = "localnet"
wallet = "~/.config/solana/id.json"

[scripts]
test = "npx ts-mocha -p ./tsconfig.json -t 300000 tests/sigil.ts tests/jupiter-integration.ts tests/flash-trade-integration.ts"
