protocol:
  id: "flash-trade"
  displayName: "Flash Trade"
  programAddress: "FLASH6Lo6h3iasJKWDs2F8TkW2UKf3s15C8PMGuVfgBn"
  idlFile: "perpetuals.json"
  idlCase: "snake"
  idlFormat: "new"

instructions:
  - idlName: "open_position"
    sdkName: "openPosition"
    actionType: "OpenPosition"
    isSpending: true
    category: "spending"
    variableLengthAfter: null
    constrainableFields:
      - idlFieldName: "collateral_amount"
        schemaFieldName: "collateralAmount"
      - idlFieldName: "size_amount"
        schemaFieldName: "sizeAmount"
    constrainableAccounts:
      - name: "market"
      - name: "target_custody"

  - idlName: "close_position"
    sdkName: "closePosition"
    actionType: "ClosePosition"
    isSpending: false
    category: "riskReducing"
    variableLengthAfter: null
    constrainableFields: []
    constrainableAccounts:
      - name: "market"

  - idlName: "increase_size"
    sdkName: "increaseSize"
    actionType: "IncreasePosition"
    isSpending: true
    category: "spending"
    variableLengthAfter: null
    constrainableFields:
      - idlFieldName: "size_delta"
        schemaFieldName: "sizeDelta"
    constrainableAccounts:
      - name: "market"
      - name: "target_custody"

  - idlName: "add_collateral"
    sdkName: "addCollateral"
    actionType: "AddCollateral"
    isSpending: true
    category: "spending"
    variableLengthAfter: null
    constrainableFields:
      - idlFieldName: "collateral_delta"
        schemaFieldName: "collateralDelta"
    constrainableAccounts:
      - name: "market"

ruleTypes:
  - type: "maxPositionSize"
    displayName: "Max Position Size"
    description: "Cap the maximum position size per trade."
    applicableActions: ["openPosition", "increaseSize"]
    params:
      - name: "maxSize"
        type: "bigint"
        label: "Max size (base units)"
        required: true
    fieldMapping:
      openPosition: "sizeAmount"
      increaseSize: "sizeDelta"
    constraintType: "data"
    operator: "lte"

actionCategories:
  spending: ["openPosition", "increaseSize", "addCollateral"]
  riskReducing: ["closePosition"]

markets:
  "SOL-USDC-long":
    market: "3vHoXbUvGhEHFsLUmxyC6VWsbYDreb1zMn9TAp5ijN5K"
    targetCustody: "BjzZ33nMnbXZ7rw3Uy9Uu1W7BDCzzugqkiZoamJHRKF7"
    collateralCustody: "BjzZ33nMnbXZ7rw3Uy9Uu1W7BDCzzugqkiZoamJHRKF7"
