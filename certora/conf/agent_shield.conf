{
    "msg": "AgentShield formal verification",
    "cargo_features": ["certora"],
    "cargo_tools_version": "v1.51",
    "rule": [
        "rule_expiry_at_least_current_slot",
        "rule_expiry_equals_saturating_add",
        "rule_session_expires_after_window",
        "rule_session_valid_at_creation",
        "rule_expiry_saturates_at_max",
        "rule_usdc_conversion_identity",
        "rule_fewer_decimals_scales_up",
        "rule_more_decimals_scales_down",
        "rule_checked_add_overflow_detection",
        "rule_max_fee_rate_is_50",
        "rule_session_expiry_is_20_slots",
        "rule_rolling_window_is_24h",
        "rule_vector_bounds_finite",
        "rule_tracker_tier_capacities",
        "rule_tracker_tier_from_u8_valid",
        "rule_tracker_tier_from_u8_invalid"
    ],
    "prover_args": [
        "-solanaOptimisticJoin true",
        "-solanaOptimisticOverlaps true",
        "-solanaOptimisticMemcpyPromotion true",
        "-solanaOptimisticMemcmp true",
        "-solanaOptimisticNoMemmove true",
        "-unsatCoresForAllAsserts true",
        "-solanaAggressiveGlobalDetection true"
    ],
    "optimistic_loop": true,
    "loop_iter": 3,
    "rule_sanity": "basic",
    "wait_for_results": "all"
}
