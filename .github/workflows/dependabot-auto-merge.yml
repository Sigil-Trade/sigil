# Auto-merge Dependabot PRs after CI passes.
#
# Dependabot PRs are low-risk version bumps. This workflow:
# 1. Waits for CI to pass (required_status_checks in ruleset)
# 2. Auto-approves the PR (required for repos with review requirements)
# 3. Enables auto-merge (squash) so GitHub merges once all checks pass
#
# Only applies to PRs opened by dependabot[bot]. Human PRs are unaffected.

name: Dependabot Auto-Merge

on: pull_request

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    if: github.actor == 'dependabot[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Fetch Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@v2
        with:
          github-token: "${{ secrets.GITHUB_TOKEN }}"

      - name: Approve PR
        run: gh pr review --approve "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Enable auto-merge (squash)
        run: gh pr merge --auto --squash "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
