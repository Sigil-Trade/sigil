# CI Pipeline for AgentShield
#
# Runs on every push to main and on pull requests.
# Three parallel jobs:
#   1. build-lint-test  — TypeScript builds, Prettier, wrapper + plugin + MCP tests
#   2. rust-checks      — cargo fmt + cargo clippy
#   3. on-chain-tests   — Anchor build + solana-test-validator + 56 on-chain tests

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs for the same branch/PR (saves CI minutes)
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  SOLANA_VERSION: "stable"
  ANCHOR_VERSION: "0.32.1"
  NODE_VERSION: "20"

jobs:
  # ──────────────────────────────────────────────────────────────
  # Job 1: TypeScript build, lint, and wrapper tests
  # ──────────────────────────────────────────────────────────────
  build-lint-test:
    name: Build, Lint & Wrapper Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all packages
        run: pnpm -r run build

      - name: Lint (Prettier)
        # Scoped to actively maintained packages for now.
        # TODO: enable repo-wide after running `npx prettier --write .`
        run: npx prettier --check "sdk/core/src/**/*.ts" "sdk/wrapper/src/**/*.ts"

      - name: Wrapper tests (49 tests, no validator needed)
        working-directory: sdk/wrapper
        run: pnpm test

      - name: SAK plugin tests (23 tests)
        working-directory: plugins/solana-agent-kit
        run: pnpm test

      - name: ElizaOS plugin tests (30 tests)
        working-directory: plugins/elizaos
        run: pnpm test

      - name: MCP server tests (78 tests)
        working-directory: packages/mcp
        run: pnpm test

  # ──────────────────────────────────────────────────────────────
  # Job 2: Rust formatting and linting
  # ──────────────────────────────────────────────────────────────
  rust-checks:
    name: Rust Format & Clippy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Cargo registry + build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            programs/agent-shield/target
          key: rust-${{ runner.os }}-${{ hashFiles('programs/agent-shield/Cargo.lock') }}
          restore-keys: rust-${{ runner.os }}-

      - name: Check formatting
        run: cargo fmt --check --manifest-path programs/agent-shield/Cargo.toml

      - name: Clippy
        # Allow Anchor-specific false positives:
        #   unexpected_cfgs — anchor-debug, custom-heap, custom-panic, solana
        #   too_many_arguments — Anchor instruction handlers need many params
        #   ambiguous_glob_reexports — all instruction modules export `handler`
        # TODO: fix remaining clippy::unnecessary_cast and clippy::derivable_impls
        run: |
          cargo clippy --manifest-path programs/agent-shield/Cargo.toml -- -D warnings \
            -A unexpected_cfgs \
            -A clippy::too_many_arguments \
            -A ambiguous_glob_reexports \
            -A clippy::unnecessary_cast \
            -A clippy::derivable_impls

  # ──────────────────────────────────────────────────────────────
  # Job 3: On-chain tests (requires Anchor + Solana validator)
  # ──────────────────────────────────────────────────────────────
  on-chain-tests:
    name: On-Chain Tests (56 tests)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry + build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ~/.cargo/bin
            target
          key: anchor-${{ runner.os }}-${{ hashFiles('programs/agent-shield/Cargo.lock') }}
          restore-keys: anchor-${{ runner.os }}-

      - name: Install Solana CLI
        run: |
          sh -c "$(curl -sSfL https://release.anza.xyz/${{ env.SOLANA_VERSION }}/install)"
          echo "$HOME/.local/share/solana/install/active_release/bin" >> $GITHUB_PATH

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y pkg-config libudev-dev

      - name: Install Anchor CLI
        run: |
          # Skip if already cached
          if ! command -v anchor &> /dev/null; then
            cargo install --git https://github.com/coral-xyz/anchor --tag v${{ env.ANCHOR_VERSION }} anchor-cli --locked --force
          fi

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Create test keypair
        run: solana-keygen new --no-bip39-passphrase --silent

      - name: Build program
        run: anchor build --no-idl

      - name: Run on-chain tests
        run: |
          # Ensure ledger parent directory exists (.anchor/ is gitignored)
          mkdir -p .anchor/test-ledger

          # Start test validator with the built program
          solana-test-validator \
            --ledger .anchor/test-ledger \
            --rpc-port 8899 \
            --bpf-program 4ZeVCqnjUgUtFrHHPG7jELUxvJeoVGHhGNgPrhBPwrHL target/deploy/agent_shield.so \
            --reset \
            --quiet &

          # Wait for validator to be ready
          sleep 10

          # Run tests (excluding devnet-smoke.ts which requires devnet)
          ANCHOR_PROVIDER_URL=http://localhost:8899 \
          ANCHOR_WALLET=~/.config/solana/id.json \
            npx ts-mocha -p ./tsconfig.json -t 1000000 \
              tests/agent-shield.ts \
              tests/jupiter-integration.ts \
              tests/flash-trade-integration.ts

          # Clean up
          pkill -f solana-test-validator || true
