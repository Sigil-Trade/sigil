# CI Pipeline for AgentShield
#
# Runs on every push to main and on pull requests.
# Nine jobs (1 detection + 6 parallel + 1 CodeQL + 1 gate):
#   0. changes                — Detect which file groups changed (path filtering)
#   1. build-lint-test        — TypeScript builds, Prettier (10 packages), 470 TS tests across 8 suites
#   2. rust-checks            — cargo fmt + cargo clippy
#   3. on-chain-tests         — Anchor build + LiteSVM in-process + 174 on-chain tests (93 core + 81 security exploits)
#   4. security-scan          — Sec3 X-Ray static analysis (BLOCKING)
#   5. formal-verification    — Certora Solana Prover (Rust changes only, BLOCKING)
#   6. fuzz-test              — Trident fuzz test: 1000 iterations (BLOCKING)
#   7. security-gate          — All-pass gate for branch protection
#
# Total: 644 tests across 13 suites (470 TS + 174 on-chain)
# All security checks are BLOCKING — zero tolerance for known issues.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Least-privilege: only read repo contents by default
permissions:
  contents: read

# Cancel in-progress runs for the same branch/PR (saves CI minutes)
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  SOLANA_VERSION: "stable"
  ANCHOR_VERSION: "0.32.1"
  NODE_VERSION: "24"

jobs:
  # ──────────────────────────────────────────────────────────────
  # Job 0: Detect which file groups changed (for conditional jobs)
  # ──────────────────────────────────────────────────────────────
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      rust: ${{ steps.filter.outputs.rust }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: dorny/paths-filter@de90cc6fb38fc0963ad72b210f1f284cd68cea36 # v3.0.2
        id: filter
        with:
          filters: |
            rust:
              - 'programs/**'
              - 'certora/**'
              - 'trident-tests/**'

  # ──────────────────────────────────────────────────────────────
  # Job 1: TypeScript build, lint, and tests (8 suites, 470 tests)
  # ──────────────────────────────────────────────────────────────
  build-lint-test:
    name: Build, Lint & TS Tests
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install pnpm
        uses: pnpm/action-setup@41ff72655975bd51cab0327fa583b6e92b6d3061 # v4
        with:
          version: 10

      - name: Install Node.js
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Audit dependencies (critical — blocking)
        run: pnpm audit --audit-level=critical

      - name: Audit dependencies (high — advisory)
        run: pnpm audit --audit-level=high || true
        # Non-blocking for high-severity advisories — tracked in security backlog.

      - name: Build all packages
        run: pnpm -r run build

      - name: Lint (Prettier — 10 packages)
        run: |
          npx prettier --check \
            "sdk/core/src/**/*.ts" \
            "sdk/wrapper/src/**/*.ts" \
            "sdk/typescript/src/**/*.ts" \
            "sdk/platform/src/**/*.ts" \
            "sdk/custody/crossmint/src/**/*.ts" \
            "plugins/solana-agent-kit/src/**/*.ts" \
            "plugins/elizaos/src/**/*.ts" \
            "packages/mcp/src/**/*.ts" \
            "packages/mcp/tests/**/*.ts" \
            "apps/actions-server/src/**/*.ts" \
            "apps/actions-server/tests/**/*.ts"

      - name: Core policy engine tests (66 tests)
        working-directory: sdk/core
        run: pnpm test

      - name: SDK tests (135 tests)
        working-directory: sdk/typescript
        run: pnpm test

      - name: Platform client tests (17 tests)
        working-directory: sdk/platform
        run: pnpm test

      - name: Crossmint custody adapter tests (29 tests)
        working-directory: sdk/custody/crossmint
        run: pnpm test

      - name: SAK plugin tests (25 tests)
        working-directory: plugins/solana-agent-kit
        run: pnpm test

      - name: ElizaOS plugin tests (32 tests)
        working-directory: plugins/elizaos
        run: pnpm test

      - name: MCP server tests (118 tests)
        working-directory: packages/mcp
        run: pnpm test

      - name: Actions server tests (48 tests)
        working-directory: apps/actions-server
        run: pnpm test

      - name: Generate test summary
        if: always()
        run: |
          echo "AgentShield Test Report - $(date -u +%Y-%m-%dT%H:%M:%SZ)" > test-summary.txt
          echo "Branch: ${{ github.ref_name }}" >> test-summary.txt
          echo "Commit: ${{ github.sha }}" >> test-summary.txt
          echo "---" >> test-summary.txt
          echo "All 8 TypeScript test suites executed." >> test-summary.txt
          echo "See individual step logs for detailed output." >> test-summary.txt

      - name: Upload test summary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-summary
          path: test-summary.txt
          retention-days: 90

      - name: Update README test counts
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: node scripts/update-test-counts.js

      - name: Commit updated README
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet README.md .github/workflows/ci.yml || \
            (git add README.md .github/workflows/ci.yml && \
             git commit -m "chore: update test counts [skip ci]" && \
             git push)

  # ──────────────────────────────────────────────────────────────
  # Job 2: Rust formatting and linting
  # ──────────────────────────────────────────────────────────────
  rust-checks:
    name: Rust Format & Clippy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@efa25f7f19611383d5b0ccf2d1c8914531636bf9 # stable
        with:
          toolchain: stable
          components: rustfmt, clippy

      - name: Cache Cargo registry + build
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            programs/agent-shield/target
          key: rust-${{ runner.os }}-${{ hashFiles('programs/agent-shield/Cargo.lock') }}
          restore-keys: rust-${{ runner.os }}-

      - name: Check formatting
        run: cargo fmt --check --manifest-path programs/agent-shield/Cargo.toml

      - name: Clippy
        # Allow Anchor-specific false positives:
        #   unexpected_cfgs — anchor-debug, custom-heap, custom-panic, solana
        #   too_many_arguments — Anchor instruction handlers need many params
        #   ambiguous_glob_reexports — all instruction modules export `handler`
        run: |
          cargo clippy --manifest-path programs/agent-shield/Cargo.toml -- -D warnings \
            -A unexpected_cfgs \
            -A clippy::too_many_arguments \
            -A ambiguous_glob_reexports

  # ──────────────────────────────────────────────────────────────
  # Job 3: On-chain tests (LiteSVM in-process, no validator)
  # ──────────────────────────────────────────────────────────────
  on-chain-tests:
    name: On-Chain Tests (174 tests, LiteSVM)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@efa25f7f19611383d5b0ccf2d1c8914531636bf9 # stable
        with:
          toolchain: stable

      - name: Cache Cargo registry + build
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ~/.cargo/bin
            target
          key: anchor-${{ runner.os }}-${{ hashFiles('programs/agent-shield/Cargo.lock') }}
          restore-keys: anchor-${{ runner.os }}-

      - name: Install Solana CLI
        run: |
          sh -c "$(curl -sSfL https://release.anza.xyz/${{ env.SOLANA_VERSION }}/install)"
          echo "$HOME/.local/share/solana/install/active_release/bin" >> $GITHUB_PATH

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y pkg-config libudev-dev

      - name: Install Anchor CLI
        run: |
          # Skip if already cached
          if ! command -v anchor &> /dev/null; then
            cargo install --git https://github.com/coral-xyz/anchor --tag v${{ env.ANCHOR_VERSION }} anchor-cli --locked --force
          fi

      - name: Install pnpm
        uses: pnpm/action-setup@41ff72655975bd51cab0327fa583b6e92b6d3061 # v4
        with:
          version: 10

      - name: Install Node.js
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build program
        run: anchor build --no-idl

      - name: Restore committed IDL (cache may contain stale version)
        run: git checkout -- target/idl/ target/types/

      - name: Run on-chain tests (LiteSVM, in-process)
        run: |
          npx ts-mocha -p ./tsconfig.json -t 300000 \
            tests/agent-shield.ts \
            tests/jupiter-integration.ts \
            tests/flash-trade-integration.ts \
            tests/security-exploits.ts

  # ──────────────────────────────────────────────────────────────
  # Job 4: Static security analysis (Sec3 X-Ray)
  # ──────────────────────────────────────────────────────────────
  security-scan:
    name: Security Scan (Sec3 X-Ray)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Run Sec3 X-Ray
        run: |
          docker run --rm --volume "$(pwd):/workspace" \
            ghcr.io/sec3-product/x-ray:latest \
            /workspace/programs/agent-shield | tee xray-report.txt

      - name: Check X-Ray findings
        run: |
          if [ -f .sec3-allowlist.txt ]; then
            grep "VULNERABLE" xray-report.txt | grep -v -f .sec3-allowlist.txt > xray-filtered.txt || true
          else
            grep "VULNERABLE" xray-report.txt > xray-filtered.txt || true
          fi
          if [ -s xray-filtered.txt ]; then
            echo "::error::Sec3 X-Ray found vulnerabilities:"
            cat xray-filtered.txt
            exit 1
          fi
          echo "No actionable vulnerabilities found."

      - name: Upload X-Ray report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: xray-security-report
          path: xray-report.txt
          retention-days: 90

  # ──────────────────────────────────────────────────────────────
  # Job 5: Formal verification (Certora Solana Prover)
  #
  # BLOCKING — all 16 rules must pass (16/16 Verified).
  #
  # Uses platform-tools v1.51 (Rust 1.84.1+) via the conf file's
  # cargo_tools_version field. This resolves the Cargo.lock v4
  # incompatibility that affected earlier platform-tools versions.
  #
  # For local verification see: scripts/run-certora.sh
  # ──────────────────────────────────────────────────────────────
  formal-verification:
    name: Formal Verification (Certora)
    needs: changes
    runs-on: ubuntu-latest
    environment: Certora
    if: needs.changes.outputs.rust == 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install Rust (1.81 — minimum for cargo-certora-sbf)
        uses: dtolnay/rust-toolchain@efa25f7f19611383d5b0ccf2d1c8914531636bf9 # stable
        with:
          toolchain: "1.81"

      - name: Cache Cargo registry + binaries
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ~/.cargo/bin
          key: certora-${{ runner.os }}-cargo-certora-sbf-v1.51
          restore-keys: certora-${{ runner.os }}-

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Certora CLI
        run: |
          python -m venv .certora-venv
          source .certora-venv/bin/activate
          pip install certora-cli

      - name: Install cargo-certora-sbf
        run: cargo install cargo-certora-sbf --force

      - name: Run Certora Solana Prover
        env:
          CERTORAKEY: ${{ secrets.CERTORAKEY }}
        run: |
          source .certora-venv/bin/activate
          certoraSolanaProver certora/conf/agent_shield.conf

      - name: Upload Certora report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: certora-report
          path: .certora_internal/
          retention-days: 90

  # ──────────────────────────────────────────────────────────────
  # Job 6: Fuzz test (Trident — 1000 iterations, 100 flows each)
  # ──────────────────────────────────────────────────────────────
  fuzz-test:
    name: Fuzz Test (Trident, 1000 iterations)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@efa25f7f19611383d5b0ccf2d1c8914531636bf9 # stable
        with:
          toolchain: stable

      - name: Cache Cargo registry + build
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            trident-tests/target
          key: trident-${{ runner.os }}-${{ hashFiles('trident-tests/Cargo.lock') }}
          restore-keys: trident-${{ runner.os }}-

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y pkg-config libudev-dev

      - name: Compile fuzz harness
        working-directory: trident-tests
        run: cargo build --release --bin fuzz_0

      - name: Run fuzz test (1000 iterations, 100 flows each)
        working-directory: trident-tests
        run: |
          timeout 600 ./target/release/fuzz_0 || EXIT=$?
          if [ "${EXIT:-0}" -eq 124 ]; then
            echo "::error::Fuzz test timed out after 10 minutes"
            exit 1
          elif [ "${EXIT:-0}" -ne 0 ]; then
            echo "::error::Fuzz test found invariant violations!"
            exit 1
          fi
          echo "Fuzz test completed successfully (1000 iterations, 100 flows each)"

      - name: Upload crash artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: fuzz-crashes
          path: |
            trident-tests/trident-crashes/
            trident-tests/crash-*
          retention-days: 90
          if-no-files-found: ignore

  # ──────────────────────────────────────────────────────────────
  # Gate: All checks must pass before merge
  # ──────────────────────────────────────────────────────────────
  security-gate:
    name: Security Gate
    runs-on: ubuntu-latest
    if: always()
    needs:
      - build-lint-test
      - rust-checks
      - on-chain-tests
      - security-scan
      - formal-verification
      - fuzz-test
    steps:
      - name: Check all jobs passed
        run: |
          echo "Job results:"
          echo "  build-lint-test:       ${{ needs.build-lint-test.result }}"
          echo "  rust-checks:           ${{ needs.rust-checks.result }}"
          echo "  on-chain-tests:        ${{ needs.on-chain-tests.result }}"
          echo "  security-scan:         ${{ needs.security-scan.result }}"
          echo "  formal-verification:   ${{ needs.formal-verification.result }}"
          echo "  fuzz-test:             ${{ needs.fuzz-test.result }}"
          echo ""

          FAILED=0
          for result in \
            "${{ needs.build-lint-test.result }}" \
            "${{ needs.rust-checks.result }}" \
            "${{ needs.on-chain-tests.result }}" \
            "${{ needs.security-scan.result }}" \
            "${{ needs.formal-verification.result }}" \
            "${{ needs.fuzz-test.result }}"; do
            if [ "$result" != "success" ] && [ "$result" != "skipped" ]; then
              FAILED=1
            fi
          done

          if [ "$FAILED" -eq 1 ]; then
            echo "::error::Security gate failed. One or more required jobs did not pass. Merge blocked."
            exit 1
          fi
          echo "All required checks passed."
