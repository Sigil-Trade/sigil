# CI Pipeline for Sigil
#
# Runs on every push to main and on pull requests.
# Eight jobs (1 detection + 6 parallel + 1 gate):
#   0. changes                — Detect which file groups changed (package-level path filtering)
#   1. build-lint-test        — TypeScript builds, Prettier, 1810 TS tests (conditional: any-ts or push)
#   2. rust-checks            — cargo fmt + cargo clippy (conditional: rust changes or push)
#   3. on-chain-tests         — Anchor build + LiteSVM 515 tests (conditional: rust changes or push)
#  3b. build-verification     — Feature flag safety net (conditional: rust changes or push)
#  3c. surfpool-integration   — Surfpool integration tests, 59 tests (conditional: rust changes or push)
#   4. security-scan          — Sec3 X-Ray static analysis (always, BLOCKING)
#   5. formal-verification    — Certora Solana Prover (conditional: certora changes, BLOCKING)
#   6. fuzz-test              — Trident fuzz 1K iterations (conditional: rust changes or push, BLOCKING)
#   7. security-gate          — All-pass gate with skip-awareness for branch protection
#
# Path filtering strategy:
#   PRs  — Only run suites for changed packages (saves CI minutes)
#   Push — Always run everything (safety net on main)
#
# Individual TS test steps also filter by package:
#   sdk/kit → Kit SDK tests (1099 tests, includes merged core)
#   sdk/platform → Platform tests (17 tests)
#   sdk/custody → Custody adapter tests (96 tests)
#   packages/plugins → Plugin tests (14 tests)
#
# Total: ~2,526 tests across 20 suites (1810 TS + 515 on-chain + 59 Surfpool + 142 devnet)
# All security checks are BLOCKING — zero tolerance for known issues.

name: CI

on:
  push:
    branches: [main, changeset-release/main]
  pull_request:
    branches: [main]

# Least-privilege: only read repo contents by default
permissions:
  contents: read

# Cancel in-progress runs for the same branch/PR (saves CI minutes)
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  SOLANA_VERSION: "v2.1.14"
  ANCHOR_VERSION: "0.32.1"
  NODE_VERSION: "24"

jobs:
  # ──────────────────────────────────────────────────────────────
  # Job 0: Detect which file groups changed (for conditional jobs)
  # ──────────────────────────────────────────────────────────────
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      rust: ${{ steps.filter.outputs.rust }}
      certora: ${{ steps.filter.outputs.certora }}
      sdk-platform: ${{ steps.filter.outputs.sdk-platform }}
      sdk-custody: ${{ steps.filter.outputs.sdk-custody }}
      sdk-kit: ${{ steps.filter.outputs.sdk-kit }}
      plugins: ${{ steps.filter.outputs.plugins }}
      any-ts: ${{ steps.filter.outputs.any-ts }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: filter
        with:
          filters: |
            rust:
              - 'programs/**'
              - 'certora/**'
              - 'trident-tests/**'
              - 'tests/**'
            certora:
              - 'programs/**'
              - 'certora/**'
            sdk-platform:
              - 'sdk/platform/**'
            sdk-custody:
              - 'sdk/custody/**'
            sdk-kit:
              - 'sdk/kit/**'
            plugins:
              - 'packages/plugins/**'
            any-ts:
              - 'sdk/**'
              - 'tests/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'tsconfig*.json'

  # ──────────────────────────────────────────────────────────────
  # Job 1: TypeScript build, lint, and tests (4 suites, 1810 tests)
  # ──────────────────────────────────────────────────────────────
  build-lint-test:
    name: Build, Lint & TS Tests
    needs: changes
    if: needs.changes.outputs.any-ts == 'true' || github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Generate CI bot token
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        id: app-token
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
        with:
          app-id: ${{ vars.CI_APP_ID }}
          private-key: ${{ secrets.CI_APP_PRIVATE_KEY }}

      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          token: ${{ steps.app-token.outputs.token || github.token }}

      - name: Install pnpm
        uses: pnpm/action-setup@903f9c1a6ebcba6cf41d87230be49611ac97822e # v6.0.3
        with:
          version: 10.7.1

      - name: Install Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Audit dependencies (critical — advisory until pnpm#11265)
        # npm retired the legacy /v1/security/audits endpoint server-side; pnpm 10.x
        # still calls it and fails with HTTP 410. Tracked upstream in
        # https://github.com/pnpm/pnpm/issues/11265 — fix lands in pnpm 11. Until
        # we bump the monorepo to pnpm 11, Dependabot is the real security coverage
        # here, so this step stays advisory rather than silently masking the gap.
        run: pnpm audit --audit-level=critical || true

      - name: Audit dependencies (high — advisory)
        run: pnpm audit --audit-level=high || true
        # Non-blocking for high-severity advisories — tracked in security backlog.

      - name: Build all packages
        run: pnpm -r run build

      - name: Lint (Prettier — 3 packages)
        run: |
          npx prettier --check \
            "sdk/kit/src/**/*.ts" \
            "sdk/platform/src/**/*.ts" \
            "sdk/custody/src/**/*.ts"

      # 2026-04-20 council (7-0 STRICT): belt-and-suspenders grep check.
      # Legacy variadic helpers were renamed to *Legacy and marked @deprecated.
      # This grep blocks re-introduction of the un-suffixed `expectError(` form.
      # The new strict helper is also named `expectSigilError` but its object-
      # param signature means tsc catches misuse of that name — so we only
      # block the pure `expectError(` form.
      #
      # Regex uses a negative-lookbehind shim: require the char BEFORE
      # `expectError` to NOT be a word-char or dot, preventing method-call
      # false positives like `obj.expectError(` or comment-line matches
      # like `// expectError(...)`. H-4 adversarial-review fix.
      #
      # Directory existence is verified BEFORE grep to catch layout drift
      # that would otherwise silently return "no violations" (M-5 fix).
      #
      # See: MEMORY/WORK/20260420-201121_test-assertion-precision-council/COUNCIL_DECISION.md
      - name: Forbid legacy variadic error-assertion helpers
        run: |
          set -eu

          SCAN_DIRS="tests sdk/kit/tests sdk/platform/tests sdk/custody/tests packages/plugins/tests"
          for dir in $SCAN_DIRS; do
            if [ ! -d "$dir" ]; then
              echo "::error::expected test directory '$dir' not found — CI grep would silently skip"
              exit 1
            fi
          done

          # Pattern: match `expectError(` only when preceded by non-word,
          # non-dot (excludes `obj.expectError(`, `myExpectError(`, and
          # most comment continuations). Exclude Legacy variant and the
          # meta-test file (which intentionally mentions the deprecated
          # symbol for regression guarantees).
          FORBIDDEN=$(grep -rnE \
            '(^|[^A-Za-z0-9_.])expectError\s*\(' \
            --include='*.ts' \
            $SCAN_DIRS \
            | grep -vE 'expectErrorLegacy|expect-assertion\.test\.ts' \
            || true)

          if [ -n "$FORBIDDEN" ]; then
            echo "::error::Legacy variadic expectError usage detected."
            echo "$FORBIDDEN"
            echo ""
            echo "Replace with: expectSigilError(err, { name: 'ErrorName', code: 6xxx })"
            echo "Import from:  '@usesigil/kit/testing'"
            echo "See: MEMORY/WORK/20260420-201121_test-assertion-precision-council/"
            exit 1
          fi

      # Verify the Rust IDL error enum and TS assertion map stay in sync
      # (YULIA amendment — parses IDL JSON, not regex over errors.rs).
      - name: Verify error-code drift (IDL to TypeScript map)
        run: pnpm run verify:error-drift

      - name: Kit SDK tests (1683 tests)
        if: >-
          needs.changes.outputs.sdk-kit == 'true' ||
          github.event_name == 'push'
        working-directory: sdk/kit
        run: pnpm test

      - name: Platform tests (17 tests)
        if: >-
          needs.changes.outputs.sdk-platform == 'true' ||
          github.event_name == 'push'
        working-directory: sdk/platform
        run: pnpm test

      - name: Custody adapter tests (96 tests)
        if: >-
          needs.changes.outputs.sdk-custody == 'true' ||
          github.event_name == 'push'
        working-directory: sdk/custody
        run: pnpm test

      - name: Plugin tests
        if: >-
          needs.changes.outputs.plugins == 'true' ||
          github.event_name == 'push'
        working-directory: packages/plugins
        run: pnpm test

      - name: Verify Codama staleness (all discriminators)
        # Runs unconditionally. Discriminator collision is a silent
        # correctness issue — if two instructions hash to the same
        # 8-byte prefix, the program dispatches the wrong handler.
        # Check takes <5 seconds and catches regressions the path-filter
        # would miss on rust-only or docs-only changes.
        run: npx tsx scripts/verify-codama-staleness.ts

      - name: Verify Codama generated code is fresh
        if: >-
          needs.changes.outputs.sdk-kit == 'true' ||
          github.event_name == 'push'
        working-directory: sdk/kit
        run: |
          node codama.mjs --protocol=sigil --skip-hash-check
          if [ -n "$(git diff --name-only src/generated/)" ]; then
            echo "::error::Generated code is stale. Run 'pnpm codama' and commit."
            git diff --stat src/generated/
            exit 1
          fi
          echo "Generated code is up-to-date."

      - name: Generate test summary
        if: always()
        run: |
          echo "Sigil Test Report - $(date -u +%Y-%m-%dT%H:%M:%SZ)" > test-summary.txt
          echo "Branch: ${{ github.ref_name }}" >> test-summary.txt
          echo "Commit: ${{ github.sha }}" >> test-summary.txt
          echo "---" >> test-summary.txt
          echo "All 5 TypeScript test suites executed." >> test-summary.txt
          echo "See individual step logs for detailed output." >> test-summary.txt

      - name: Upload test summary
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: test-summary
          path: test-summary.txt
          retention-days: 90

      - name: Verify test counts are up to date
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          # `update-test-counts.js` is the single source of truth for test
          # counts across README / CI / release workflows. Run it here in
          # check mode — if it produces any diff, the contributing PR
          # missed running the script. Fail loudly so the drift is fixed
          # in a PR (where branch-protection checks still apply) instead
          # of attempting an auto-push that the "Security Gate required"
          # rule will always reject.
          node scripts/update-test-counts.js
          FILES="README.md .github/workflows/ci.yml .github/workflows/release.yml .github/workflows/devnet-test.yml"
          if ! git diff --quiet $FILES; then
            echo "::error::Test counts are stale. Run 'node scripts/update-test-counts.js' locally and commit the result."
            git --no-pager diff $FILES
            exit 1
          fi
          echo "Test counts are up to date."

  # ──────────────────────────────────────────────────────────────
  # Job 2: Rust formatting and linting
  # ──────────────────────────────────────────────────────────────
  rust-checks:
    name: Rust Format & Clippy
    needs: changes
    if: needs.changes.outputs.rust == 'true' || github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # stable
        with:
          toolchain: stable
          components: rustfmt, clippy

      - name: Cache Cargo registry + build
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            programs/sigil/target
          key: rust-${{ runner.os }}-${{ hashFiles('programs/sigil/Cargo.lock') }}
          restore-keys: rust-${{ runner.os }}-

      - name: Check formatting
        run: cargo fmt --check --manifest-path programs/sigil/Cargo.toml

      - name: Clippy
        # Allow Anchor-specific false positives:
        #   unexpected_cfgs — anchor-debug, custom-heap, custom-panic, solana
        #   too_many_arguments — Anchor instruction handlers need many params
        #   ambiguous_glob_reexports — all instruction modules export `handler`
        run: |
          cargo clippy --manifest-path programs/sigil/Cargo.toml -- -D warnings \
            -A unexpected_cfgs \
            -A clippy::too_many_arguments \
            -A ambiguous_glob_reexports

  # ──────────────────────────────────────────────────────────────
  # Job 3: On-chain tests (LiteSVM in-process, no validator)
  # ──────────────────────────────────────────────────────────────
  on-chain-tests:
    name: On-Chain Tests (LiteSVM)
    needs: changes
    if: needs.changes.outputs.rust == 'true' || github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # stable
        with:
          toolchain: stable

      - name: Cache Cargo registry + build
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ~/.cargo/bin
            target
          key: anchor-${{ runner.os }}-${{ hashFiles('programs/sigil/Cargo.lock') }}
          restore-keys: anchor-${{ runner.os }}-

      - name: Install Solana CLI
        run: |
          sh -c "$(curl -sSfL https://release.anza.xyz/${{ env.SOLANA_VERSION }}/install)"
          echo "$HOME/.local/share/solana/install/active_release/bin" >> $GITHUB_PATH

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y pkg-config libudev-dev

      - name: Install Anchor CLI
        run: |
          # Skip if already cached
          if ! command -v anchor &> /dev/null; then
            cargo install --git https://github.com/coral-xyz/anchor --tag v${{ env.ANCHOR_VERSION }} anchor-cli --locked --force
          fi

      - name: Install pnpm
        uses: pnpm/action-setup@903f9c1a6ebcba6cf41d87230be49611ac97822e # v6.0.3
        with:
          version: 10.7.1

      - name: Install Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build program
        run: anchor build --no-idl

      - name: Restore committed IDL (cache may contain stale version)
        run: git checkout -- target/idl/ target/types/

      - name: Run on-chain tests (LiteSVM, in-process)
        run: |
          npx ts-mocha -p ./tsconfig.json -t 300000 \
            tests/sigil.ts \
            tests/jupiter-integration.ts \
            tests/jupiter-lend-integration.ts \
            tests/flash-trade-integration.ts \
            tests/security-exploits.ts

      - name: Check for IDL drift
        run: |
          # Build the IDL using nightly toolchain and compare to committed version.
          # If they differ, the Rust changes affected the program interface and
          # the committed IDL needs to be regenerated.
          echo "Generating IDL from source..."
          RUSTUP_TOOLCHAIN=nightly anchor idl build 2>/dev/null \
            | grep -v '^\s*Compiling\|^\s*Finished\|^\s*Running' \
            > /tmp/generated-idl.json 2>/dev/null || true

          if [ -s /tmp/generated-idl.json ]; then
            # Normalize both JSONs (sort keys) for stable comparison
            python3 -c "import json,sys; json.dump(json.load(open(sys.argv[1])),open('/tmp/committed.json','w'),sort_keys=True)" target/idl/sigil.json
            python3 -c "import json,sys; json.dump(json.load(open(sys.argv[1])),open('/tmp/generated.json','w'),sort_keys=True)" /tmp/generated-idl.json

            if ! diff -q /tmp/committed.json /tmp/generated.json > /dev/null 2>&1; then
              echo "::error::IDL drift detected! The committed IDL does not match the generated IDL."
              echo "Run this locally to update:"
              echo "  RUSTUP_TOOLCHAIN=nightly anchor idl build 2>/dev/null | grep -v '^\s*Compiling\|^\s*Finished\|^\s*Running' > target/idl/sigil.json"
              echo "  anchor idl type target/idl/sigil.json -o target/types/sigil.ts"
              echo "  git add target/idl/sigil.json target/types/sigil.ts && git commit -m 'chore: regenerate IDL + types'"
              echo ""
              echo "=== Diff ==="
              diff /tmp/committed.json /tmp/generated.json | head -50 || true
              exit 1
            else
              echo "IDL is up to date."

              # Also verify target/types/sigil.ts matches what regenerating
              # from the JSON IDL produces. Catches the af35aa3 failure mode
              # where JSON was regenerated but committed TS types were not.
              anchor idl type target/idl/sigil.json -o /tmp/regenerated-types.ts 2>/dev/null
              if ! diff -q target/types/sigil.ts /tmp/regenerated-types.ts > /dev/null 2>&1; then
                echo "::error::target/types/sigil.ts is out of sync with target/idl/sigil.json."
                echo "Run: anchor idl type target/idl/sigil.json -o target/types/sigil.ts"
                exit 1
              else
                echo "target/types/sigil.ts matches IDL JSON."
              fi
            fi
          else
            echo "IDL generation skipped (nightly toolchain not available or build failed). Not blocking."
          fi

  # ──────────────────────────────────────────────────────────────
  # Job 3b: Build verification (feature flag safety net)
  #
  # Three read-only checks:
  #   1. Mainnet build compiles
  #   2. No devnet addresses leak outside cfg(feature = "devnet")
  #   3. Mainnet and devnet builds produce different binaries
  # ──────────────────────────────────────────────────────────────
  build-verification:
    name: Build Verification (Feature Flags)
    needs: changes
    if: needs.changes.outputs.rust == 'true' || github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # stable
        with:
          toolchain: stable

      - name: Cache Cargo registry + build
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ~/.cargo/bin
            target
          key: build-verify-${{ runner.os }}-${{ hashFiles('programs/sigil/Cargo.lock') }}
          restore-keys: build-verify-${{ runner.os }}-

      - name: Install Solana CLI
        run: |
          sh -c "$(curl -sSfL https://release.anza.xyz/${{ env.SOLANA_VERSION }}/install)"
          echo "$HOME/.local/share/solana/install/active_release/bin" >> $GITHUB_PATH

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y pkg-config libudev-dev

      - name: Install Anchor CLI
        run: |
          if ! command -v anchor &> /dev/null; then
            cargo install --git https://github.com/coral-xyz/anchor --tag v${{ env.ANCHOR_VERSION }} anchor-cli --locked --force
          fi

      - name: Build with mainnet feature
        run: anchor build --no-idl -- --no-default-features --features mainnet

      - name: Save mainnet binary hash
        run: sha256sum target/deploy/sigil.so > /tmp/mainnet-hash.txt

      - name: Build with devnet feature (default)
        run: anchor build --no-idl

      - name: Save devnet binary hash
        run: sha256sum target/deploy/sigil.so > /tmp/devnet-hash.txt

      - name: Verify binaries differ
        run: |
          MAINNET_HASH=$(cut -d' ' -f1 /tmp/mainnet-hash.txt)
          DEVNET_HASH=$(cut -d' ' -f1 /tmp/devnet-hash.txt)
          echo "Mainnet: $MAINNET_HASH"
          echo "Devnet:  $DEVNET_HASH"
          if [ "$MAINNET_HASH" = "$DEVNET_HASH" ]; then
            echo "::error::Mainnet and devnet builds have identical hashes — feature flags are not differentiating the binary"
            exit 1
          fi
          echo "Binaries differ as expected."

      - name: Scan for devnet addresses outside cfg(devnet)
        run: |
          # Known devnet-only addresses
          DEVNET_TREASURY="ASHie1dFTnDSnrHMPGmniJhMgfJVGPm3rAaEPnrtWDiT"

          # Search Rust source files for devnet addresses
          FOUND=0
          while IFS= read -r file; do
            # Check if the file contains the devnet address
            if grep -q "$DEVNET_TREASURY" "$file"; then
              # Verify it's inside a cfg(feature = "devnet") block
              # Simple heuristic: check if the line or nearby lines have #[cfg(feature = "devnet")]
              LINE_NUM=$(grep -n "$DEVNET_TREASURY" "$file" | head -1 | cut -d: -f1)
              # Look at the 5 lines before the match for cfg(feature = "devnet")
              START=$((LINE_NUM > 5 ? LINE_NUM - 5 : 1))
              CONTEXT=$(sed -n "${START},${LINE_NUM}p" "$file")
              if ! echo "$CONTEXT" | grep -q 'cfg(feature = "devnet")'; then
                echo "::error::Devnet address found without cfg(feature = \"devnet\") guard in $file:$LINE_NUM"
                FOUND=1
              fi
            fi
          done < <(find programs/sigil/src -name "*.rs" -type f)

          if [ "$FOUND" -eq 1 ]; then
            exit 1
          fi
          echo "No unguarded devnet addresses found."

  # ──────────────────────────────────────────────────────────────
  # Job 3c: Surfpool integration tests (20 tests)
  #
  # Runs against a local Surfnet (LiteSVM-backed validator with
  # lazy devnet forking). Tests session expiry with real slots,
  # time travel, token balance cheatcodes, and CU profiling.
  # ──────────────────────────────────────────────────────────────
  surfpool-integration:
    name: Surfpool Integration Tests
    needs: [changes, on-chain-tests]
    if: needs.changes.outputs.rust == 'true' || github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # stable
        with:
          toolchain: stable

      - name: Cache Cargo registry + build
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ~/.cargo/bin
            ~/.local/bin
            target
          key: surfpool-anchor-${{ runner.os }}-${{ hashFiles('programs/sigil/Cargo.lock') }}
          restore-keys: surfpool-anchor-${{ runner.os }}-

      - name: Install Solana CLI
        run: |
          sh -c "$(curl -sSfL https://release.anza.xyz/${{ env.SOLANA_VERSION }}/install)"
          echo "$HOME/.local/share/solana/install/active_release/bin" >> $GITHUB_PATH

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y pkg-config libudev-dev

      - name: Install Anchor CLI
        run: |
          if ! command -v anchor &> /dev/null; then
            cargo install --git https://github.com/coral-xyz/anchor --tag v${{ env.ANCHOR_VERSION }} anchor-cli --locked --force
          fi

      - name: Install Surfpool CLI
        run: |
          if ! command -v surfpool &> /dev/null; then
            curl -sL https://run.surfpool.run/ | bash
            echo "$HOME/.local/bin" >> $GITHUB_PATH
          fi

      - name: Install pnpm
        uses: pnpm/action-setup@903f9c1a6ebcba6cf41d87230be49611ac97822e # v6.0.3
        with:
          version: 10.7.1

      - name: Install Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build program
        run: anchor build --no-idl

      - name: Restore committed IDL
        run: git checkout -- target/idl/ target/types/

      - name: Start Surfpool in background
        env:
          SURFPOOL_RPC: ${{ secrets.DEVNET_RPC_URL }}
        run: |
          surfpool start --rpc-url "${SURFPOOL_RPC:-https://api.devnet.solana.com}" --slot-time 100 --ci &
          SURFPOOL_PID=$!
          echo "SURFPOOL_PID=$SURFPOOL_PID" >> $GITHUB_ENV

          # Wait for Surfnet to be ready (up to 30 attempts)
          for i in $(seq 1 30); do
            if curl -s http://localhost:8899 -X POST \
              -H "Content-Type: application/json" \
              -d '{"jsonrpc":"2.0","id":1,"method":"getSlot"}' | grep -q result; then
              echo "Surfnet ready after $i attempts"
              break
            fi
            if [ "$i" -eq 30 ]; then
              echo "::error::Surfnet failed to start after 30 attempts"
              exit 1
            fi
            sleep 2
          done

      - name: Run Surfpool integration tests
        run: npx ts-mocha -p ./tsconfig.json -t 300000 tests/surfpool-integration.ts

      - name: Stop Surfpool
        if: always()
        run: |
          if [ -n "$SURFPOOL_PID" ]; then
            kill $SURFPOOL_PID 2>/dev/null || true
          fi

  # ──────────────────────────────────────────────────────────────
  # Job 4: Static security analysis (Sec3 X-Ray)
  # ──────────────────────────────────────────────────────────────
  security-scan:
    name: Security Scan (Sec3 X-Ray)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Run Sec3 X-Ray
        run: |
          docker run --rm --volume "$(pwd):/workspace" \
            ghcr.io/sec3-product/x-ray:v0.0.6 \
            /workspace/programs/sigil 2>&1 | tee xray-report.txt

      - name: Check X-Ray findings
        run: |
          # Extract real VULNERABLE findings (exclude X-Ray's progress bar noise)
          grep "VULNERABLE" xray-report.txt | grep -v "Detecting Vulnerabilities" > xray-all-findings.txt || true

          # Show raw findings in CI log (collapsed, for audit visibility)
          if [ -s xray-all-findings.txt ]; then
            echo "::group::X-Ray raw findings (before allowlist filtering)"
            cat xray-all-findings.txt
            echo "::endgroup::"
          else
            echo "X-Ray found no VULNERABLE lines."
          fi

          # Filter out allowlisted false positives
          if [ -f .sec3-allowlist.txt ]; then
            # Strip comments and blank lines to avoid empty-pattern grep trap
            sed -e 's/#.*//' -e '/^[[:space:]]*$/d' .sec3-allowlist.txt > xray-patterns.txt || true
            if [ -s xray-patterns.txt ]; then
              grep -v -f xray-patterns.txt xray-all-findings.txt > xray-filtered.txt || true
            else
              cp xray-all-findings.txt xray-filtered.txt
            fi
          else
            cp xray-all-findings.txt xray-filtered.txt
          fi

          # Fail if any unfiltered vulnerabilities remain
          if [ -s xray-filtered.txt ]; then
            echo "::error::Sec3 X-Ray found unallowlisted vulnerabilities:"
            cat xray-filtered.txt
            exit 1
          fi
          echo "All X-Ray findings are allowlisted or no vulnerabilities found."

      - name: Upload X-Ray report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: xray-security-report
          path: |
            xray-report.txt
            xray-all-findings.txt
            xray-filtered.txt
          retention-days: 90

  # ──────────────────────────────────────────────────────────────
  # Job 5: Formal verification (Certora Solana Prover)
  #
  # BLOCKING — all 16 rules must pass (16/16 Verified).
  #
  # Uses platform-tools v1.51 (Rust 1.84.1+) via the conf file's
  # cargo_tools_version field. This resolves the Cargo.lock v4
  # incompatibility that affected earlier platform-tools versions.
  #
  # For local verification see: scripts/run-certora.sh
  # ──────────────────────────────────────────────────────────────
  formal-verification:
    name: Formal Verification (Certora)
    needs: changes
    runs-on: ubuntu-latest
    environment: Certora
    if: needs.changes.outputs.certora == 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install Rust (1.81 — minimum for cargo-certora-sbf)
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # stable
        with:
          toolchain: "1.81"

      - name: Cache Cargo registry + binaries
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ~/.cargo/bin
          key: certora-${{ runner.os }}-cargo-certora-sbf-v1.51
          restore-keys: certora-${{ runner.os }}-

      - name: Install Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.11"

      - name: Install Certora CLI
        run: |
          python -m venv .certora-venv
          source .certora-venv/bin/activate
          pip install certora-cli

      - name: Install cargo-certora-sbf
        run: cargo install cargo-certora-sbf --force

      - name: Run Certora Solana Prover
        env:
          CERTORAKEY: ${{ secrets.CERTORAKEY }}
        run: |
          if [ -z "$CERTORAKEY" ]; then
            echo "::warning::CERTORAKEY not available (Dependabot PR). Skipping formal verification."
            exit 0
          fi
          source .certora-venv/bin/activate
          certoraSolanaProver certora/conf/sigil.conf

      - name: Upload Certora report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: certora-report
          path: .certora_internal/
          retention-days: 90

  # ──────────────────────────────────────────────────────────────
  # Job 6: Fuzz test (Trident — 1000 iterations, 100 flows each)
  # ──────────────────────────────────────────────────────────────
  fuzz-test:
    name: Fuzz Test (Trident, 1000 iterations)
    needs: changes
    if: needs.changes.outputs.rust == 'true' || github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # stable
        with:
          toolchain: stable

      - name: Cache Cargo registry + build
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            trident-tests/target
          key: trident-${{ runner.os }}-${{ hashFiles('trident-tests/Cargo.lock') }}
          restore-keys: trident-${{ runner.os }}-

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y pkg-config libudev-dev

      - name: Compile fuzz harness
        working-directory: trident-tests
        run: cargo build --release --bin fuzz_0

      - name: Run fuzz test (1000 iterations, 100 flows each)
        working-directory: trident-tests
        run: |
          timeout 600 ./target/release/fuzz_0 || EXIT=$?
          if [ "${EXIT:-0}" -eq 124 ]; then
            echo "::error::Fuzz test timed out after 10 minutes"
            exit 1
          elif [ "${EXIT:-0}" -ne 0 ]; then
            echo "::error::Fuzz test found invariant violations!"
            exit 1
          fi
          echo "Fuzz test completed successfully (1000 iterations, 100 flows each)"

      - name: Upload crash artifacts
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: fuzz-crashes
          path: |
            trident-tests/trident-crashes/
            trident-tests/crash-*
          retention-days: 90
          if-no-files-found: ignore

  # ──────────────────────────────────────────────────────────────
  # Gate: All checks must pass before merge
  # ──────────────────────────────────────────────────────────────
  security-gate:
    name: Security Gate
    runs-on: ubuntu-latest
    if: always()
    needs:
      - changes
      - build-lint-test
      - rust-checks
      - on-chain-tests
      - build-verification
      - surfpool-integration
      - security-scan
      - formal-verification
      - fuzz-test
    steps:
      - name: Check all jobs passed
        run: |
          echo "Job results:"
          echo "  changes:               ${{ needs.changes.result }}"
          echo "  build-lint-test:       ${{ needs.build-lint-test.result }}"
          echo "  rust-checks:           ${{ needs.rust-checks.result }}"
          echo "  on-chain-tests:        ${{ needs.on-chain-tests.result }}"
          echo "  build-verification:    ${{ needs.build-verification.result }}"
          echo "  surfpool-integration:  ${{ needs.surfpool-integration.result }}"
          echo "  security-scan:         ${{ needs.security-scan.result }}"
          echo "  formal-verification:   ${{ needs.formal-verification.result }}"
          echo "  fuzz-test:             ${{ needs.fuzz-test.result }}"
          echo ""
          echo "Path filter outputs:"
          echo "  any-ts:  ${{ needs.changes.outputs.any-ts }}"
          echo "  rust:    ${{ needs.changes.outputs.rust }}"
          echo "  certora: ${{ needs.changes.outputs.certora }}"
          echo ""

          FAILED=0

          # changes job must always succeed
          if [ "${{ needs.changes.result }}" != "success" ]; then
            echo "::error::changes job did not succeed"
            FAILED=1
          fi

          # security-scan must always succeed (runs unconditionally)
          if [ "${{ needs.security-scan.result }}" != "success" ]; then
            echo "::error::security-scan did not succeed"
            FAILED=1
          fi

          # build-lint-test: required when TS files changed, skipped is OK otherwise
          BLT="${{ needs.build-lint-test.result }}"
          ANY_TS="${{ needs.changes.outputs.any-ts }}"
          if [ "$ANY_TS" = "true" ] || [ "${{ github.event_name }}" = "push" ]; then
            if [ "$BLT" != "success" ]; then
              echo "::error::build-lint-test required (TS changes or push) but got: $BLT"
              FAILED=1
            fi
          else
            if [ "$BLT" != "skipped" ] && [ "$BLT" != "success" ]; then
              echo "::error::build-lint-test failed or was cancelled (got: $BLT)"
              FAILED=1
            fi
          fi

          # rust-checks, on-chain-tests, build-verification, surfpool-integration, fuzz-test: required when Rust files changed
          RUST_CHANGED="${{ needs.changes.outputs.rust }}"
          for job_name in rust-checks on-chain-tests build-verification surfpool-integration fuzz-test; do
            case "$job_name" in
              rust-checks)           result="${{ needs.rust-checks.result }}" ;;
              on-chain-tests)        result="${{ needs.on-chain-tests.result }}" ;;
              build-verification)    result="${{ needs.build-verification.result }}" ;;
              surfpool-integration)  result="${{ needs.surfpool-integration.result }}" ;;
              fuzz-test)             result="${{ needs.fuzz-test.result }}" ;;
            esac

            if [ "$RUST_CHANGED" = "true" ] || [ "${{ github.event_name }}" = "push" ]; then
              if [ "$result" != "success" ]; then
                echo "::error::$job_name required (Rust changes or push) but got: $result"
                FAILED=1
              fi
            else
              if [ "$result" != "skipped" ] && [ "$result" != "success" ]; then
                echo "::error::$job_name failed or was cancelled (got: $result)"
                FAILED=1
              fi
            fi
          done

          # formal-verification: conditional on certora output
          CERTORA_CHANGED="${{ needs.changes.outputs.certora }}"
          FV="${{ needs.formal-verification.result }}"
          if [ "$CERTORA_CHANGED" = "true" ]; then
            if [ "$FV" != "success" ]; then
              echo "::error::Certora changes detected but formal-verification did not succeed (got: $FV)"
              FAILED=1
            fi
          else
            if [ "$FV" != "success" ] && [ "$FV" != "skipped" ]; then
              echo "::error::formal-verification failed or was cancelled (got: $FV)"
              FAILED=1
            fi
          fi

          if [ "$FAILED" -eq 1 ]; then
            echo "::error::Security gate failed. One or more required jobs did not pass."
            exit 1
          fi
          echo "All required checks passed."
