# Automated release workflow using Changesets.
#
# Dual behavior on push to main:
#   1. Changeset files exist  → opens/updates a "Version Packages" PR
#      (bumps versions, generates changelogs, deletes consumed changesets)
#   2. No changeset files     → publishes changed packages to npm
#      (runs after the Version Packages PR is merged)
#
# Two-job design:
#   - check:   Fast (checkout only, no approval) — detects if release is needed
#   - release: Gated by `environment: production` — only runs when check says yes
#
# Short-circuits when there are no changesets AND the commit is not a
# "version packages" merge — avoids wasting CI minutes on non-release pushes.
#
# Uses npm OIDC Trusted Publishing (provenance) — no stored npm token.
# Each @agent-shield package must have Trusted Publishing configured
# on npmjs.com → Package Settings → Publishing access → Trusted Publishers.

name: Release

on:
  push:
    branches: [main]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false # Never cancel a publish in progress

permissions:
  contents: write # Push tags, update Version Packages PR
  pull-requests: write # Open/update the Version Packages PR
  id-token: write # npm OIDC Trusted Publishing (provenance)

jobs:
  # ──────────────────────────────────────────────────────────────
  # Job 1: Fast check — no environment gate, runs immediately
  # ──────────────────────────────────────────────────────────────
  check:
    name: Check Release
    runs-on: ubuntu-latest
    if: github.actor != 'github-actions[bot]'
    outputs:
      needed: ${{ steps.release-check.outputs.needed }}
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Check if release is needed
        id: release-check
        run: |
          # Check for changeset files (excluding README.md)
          CHANGESET_FILES=$(find .changeset -name '*.md' ! -name 'README.md' 2>/dev/null | wc -l)
          # Check if this is a version packages commit (needs publish)
          COMMIT_MSG=$(git log -1 --pretty=%s)
          if [ "$CHANGESET_FILES" -gt 0 ] || echo "$COMMIT_MSG" | grep -q "chore: version packages"; then
            echo "needed=true" >> $GITHUB_OUTPUT
            echo "Release needed: changeset_files=$CHANGESET_FILES, commit='$COMMIT_MSG'"
          else
            echo "needed=false" >> $GITHUB_OUTPUT
            echo "No release needed — skipping."
          fi

  # ──────────────────────────────────────────────────────────────
  # Job 2: Release — environment-gated, only when check says yes
  # ──────────────────────────────────────────────────────────────
  release:
    name: Release
    needs: check
    if: needs.check.outputs.needed == 'true'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@41ff72655975bd51cab0327fa583b6e92b6d3061 # v4
        with:
          version: 10

      - name: Install Node.js
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
        with:
          node-version: 24
          registry-url: "https://registry.npmjs.org"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all packages
        run: pnpm -r run build

      - name: Run core policy engine tests (66 tests)
        working-directory: sdk/core
        run: pnpm test

      - name: Run SDK tests (165 tests)
        working-directory: sdk/typescript
        run: pnpm test

      - name: Run platform client tests (17 tests)
        working-directory: sdk/platform
        run: pnpm test

      - name: Run Crossmint custody adapter tests (29 tests)
        working-directory: sdk/custody/crossmint
        run: pnpm test

      - name: Run SAK plugin tests (29 tests)
        working-directory: plugins/solana-agent-kit
        run: pnpm test

      - name: Run ElizaOS plugin tests (35 tests)
        working-directory: plugins/elizaos
        run: pnpm test

      - name: Run MCP server tests (123 tests)
        working-directory: packages/mcp
        run: pnpm test

      - name: Run actions server tests (48 tests)
        working-directory: apps/actions-server
        run: pnpm test

      - name: Create Release Pull Request or Publish
        id: changesets
        uses: changesets/action@6a0a831ff30acef54f2c6aa1cbbc1096b066edaf # v1.7.0
        with:
          version: pnpm changeset version
          publish: pnpm changeset publish
          title: "chore: version packages"
          commit: "chore: version packages"
          createGithubReleases: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_CONFIG_PROVENANCE: true
