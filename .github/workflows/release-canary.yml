# Snapshot Release — Canary @canary npm dist-tag
#
# Triggers on every push to `main` that touches SDK source.
# Publishes SHA-suffixed pre-release versions to the @canary dist-tag, e.g.
#   @usesigil/kit@0.16.0-canary-abc1234
#
# These versions NEVER shadow stable @latest releases — the SHA suffix
# guarantees uniqueness. Consumers opt in via `npm install <pkg>@canary`.
#
# Pattern reference:
#   - Squads (canary tag): https://www.npmjs.com/package/@sqds/multisig
#   - Kamino (beta tag):   https://www.npmjs.com/package/@kamino-finance/klend-sdk
#   - Changesets snapshot: https://github.com/changesets/changesets/blob/main/docs/snapshot-releases.md
#
# Why @canary (not @next or @beta):
#   - Squads convention; matches our other Solana-protocol terminology
#   - npm @next is reserved by some packages for "next major" — avoids confusion
#   - Snapshot releases are pre-tested on devnet (staging program) before this fires,
#     so "canary" (early-warning) is semantically accurate
#
# This workflow runs IN ADDITION TO release.yml. release.yml handles the stable
# Changesets "Version Packages" PR flow (@latest tag). This workflow handles
# per-merge snapshots (@canary tag). They never conflict because:
#   - Stable: 0.16.0           -> @latest
#   - Canary: 0.16.0-canary-XX -> @canary
# Different versions, different dist-tags, no version-number collision possible.

name: Release Canary

on:
  push:
    branches: [main]
    paths:
      - "sdk/**"
      - "packages/**"
      - "pnpm-lock.yaml"
      - "package.json"
  workflow_dispatch: # Manual trigger for re-publishing the latest commit

concurrency:
  # One canary publish at a time per branch. Don't cancel — npm publishes are atomic.
  group: release-canary-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write # npm OIDC Trusted Publishing (provenance)

jobs:
  # Skip-check runs first — sets `should_publish` output. Subsequent jobs gate on it.
  # We use a separate job (rather than `if:` on the main job) so head_commit.message
  # never appears in shell context — only as an env var inside the step.
  check:
    name: Check if snapshot needed
    runs-on: ubuntu-latest
    if: github.actor != 'github-actions[bot]'
    outputs:
      should_publish: ${{ steps.gate.outputs.should_publish }}
    steps:
      - name: Skip if commit is a Version Packages merge
        id: gate
        # Pass commit message via env var (NOT inline interpolation) to prevent
        # script injection per GitHub Security guidance:
        # https://github.blog/security/vulnerability-research/how-to-catch-github-actions-workflow-injections-before-attackers-do/
        env:
          HEAD_COMMIT_MSG: ${{ github.event.head_commit.message }}
        run: |
          # Compare strings safely — no eval, no expansion in patterns.
          if [[ "${HEAD_COMMIT_MSG%%$'\n'*}" == "chore: version packages"* ]]; then
            echo "Stable Version Packages merge detected — skip canary (release.yml handles @latest)."
            echo "should_publish=false" >> "$GITHUB_OUTPUT"
          else
            echo "should_publish=true" >> "$GITHUB_OUTPUT"
          fi

  publish-canary:
    name: Publish @canary snapshot
    needs: check
    if: needs.check.outputs.should_publish == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5
        with:
          version: 10

      - name: Install Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          registry-url: "https://registry.npmjs.org"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all packages
        run: pnpm -r run build

      - name: Compute snapshot identifier
        id: snapshot
        # Use the short commit SHA as the snapshot identifier. This guarantees:
        #   1. Uniqueness across the lifetime of the repo
        #   2. Traceability — git checkout the SHA from the version
        #   3. No collision with stable releases (which never have a -<sha> suffix)
        run: |
          SHORT_SHA="$(git rev-parse --short=8 HEAD)"
          echo "id=canary-${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "Snapshot identifier: canary-${SHORT_SHA}"

      - name: Run Kit SDK tests (defense-in-depth before snapshot publish)
        working-directory: sdk/kit
        run: pnpm test

      - name: Generate snapshot versions via Changesets
        env:
          SNAPSHOT_ID: ${{ steps.snapshot.outputs.id }}
          # `changesets version` calls @changesets/get-github-info to enrich
          # changelog entries with PR links + commit authors. That helper
          # hits the GitHub API and requires GITHUB_TOKEN with read:user +
          # repo:status scopes — both present in the default secrets.GITHUB_TOKEN
          # for workflows with permissions.contents: read. Without this env
          # var the step fails with: "Please create a GitHub personal access
          # token ... with read:user and repo:status permissions". Using the
          # repository-scoped secret (not an external PAT) is the safe pattern.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # `--snapshot <id>` produces SHA-suffixed versions like 0.16.0-canary-abc1234.
          # No changeset files required — this works even with no pending changesets.
          # See: https://github.com/changesets/changesets/blob/main/docs/snapshot-releases.md
          pnpm changeset version --snapshot "$SNAPSHOT_ID"

      - name: Publish snapshot to @canary dist-tag
        env:
          NPM_CONFIG_PROVENANCE: "true" # OIDC attestation, same as stable @latest
        run: |
          # `--no-git-tag` prevents tagging (snapshots are ephemeral, not tracked in git).
          # `--tag canary` sets the npm dist-tag (consumers do `npm i @usesigil/kit@canary`).
          pnpm changeset publish --no-git-tag --tag canary

      - name: Print published versions
        env:
          COMMIT_SHA: ${{ github.sha }}
          SNAPSHOT_ID: ${{ steps.snapshot.outputs.id }}
        run: |
          {
            echo "## Canary snapshot published"
            echo ""
            echo "Commit: \`${COMMIT_SHA}\`"
            echo "Snapshot ID: \`${SNAPSHOT_ID}\`"
            echo ""
            echo "Consumers can install with:"
            echo '```bash'
            echo "npm install @usesigil/kit@canary"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
