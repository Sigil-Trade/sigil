# Devnet Tests — Real Solana devnet integration tests
#
# Triggers:
#   - Called by deploy-devnet.yml after program + IDL deploy (primary)
#   - Nightly at 2 AM UTC (catches network/RPC drift)
#   - Manual dispatch (optional: specific test file or verbose mode)
#
# NOTE: No longer triggers on push to main for programs/** paths.
# The deploy-devnet.yml workflow handles: build → deploy → test (chained).
# This prevents tests from running against a stale program binary.
#
# 95 tests across 9 files. Costs SOL — never runs on PRs.

name: Devnet Tests

on:
  workflow_call: # Called by deploy-devnet.yml after successful deploy
  # schedule:                          # DISABLED 2026-04-03 — see deploy-devnet.yml Job 3 comment
  #   - cron: "0 2 * * *"             # Nightly runs hit same UnauthorizedTokenTransfer failure
  workflow_dispatch:
    inputs:
      test-filter:
        description: 'Specific test file (e.g., devnet-smoke.ts) or "all"'
        required: false
        default: "all"

# Prevent concurrent devnet runs (shared wallet)
concurrency:
  group: devnet-tests
  cancel-in-progress: false

# M6: Least-privilege — only read repo contents
permissions:
  contents: read

jobs:
  devnet-test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4
        with:
          version: 10

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: "24"
          cache: "pnpm"

      - run: pnpm install --frozen-lockfile

      - name: Install Solana CLI
        run: |
          sh -c "$(curl -sSfL https://release.anza.xyz/v2.1.14/install)"
          echo "$HOME/.local/share/solana/install/active_release/bin" >> $GITHUB_PATH

      - name: Configure devnet wallet
        run: |
          mkdir -p "$HOME/.config/solana"
          echo '${{ secrets.DEVNET_WALLET_KEYPAIR }}' > "$HOME/.config/solana/id.json"
          solana config set --url "${{ secrets.DEVNET_RPC_URL }}" --keypair "$HOME/.config/solana/id.json" > /dev/null 2>&1

      - name: Fund wallet (public faucet)
        run: |
          echo "Current balance: $(solana balance)"
          echo "Requesting airdrops from public faucet..."
          for i in $(seq 1 6); do
            BAL=$(solana balance | awk '{print int($1)}')
            if [ "$BAL" -ge 5 ]; then
              echo "Balance is ${BAL} SOL (>= 5). Sufficient."
              break
            fi
            echo "Attempt $i/6 — balance: ${BAL} SOL"
            if solana airdrop 0.5 --url https://api.devnet.solana.com; then
              echo "Success. Waiting 30s..."
              sleep 30
            else
              echo "Failed (likely rate limit). Waiting 120s..."
              sleep 120
            fi
          done
          echo "Final balance: $(solana balance)"

      - name: Balance gate
        run: |
          BAL=$(solana balance | awk '{print int($1)}')
          if [ "$BAL" -lt 1 ]; then
            echo "::error::Insufficient SOL for devnet tests. Balance: $(solana balance). Need >= 1 SOL."
            echo "Top up manually: solana airdrop 2 --url https://api.devnet.solana.com"
            echo "Or run the Devnet SOL Funder workflow manually."
            exit 1
          fi
          echo "Balance gate passed: $(solana balance)"

      - name: Export wallet path
        run: |
          echo "ANCHOR_WALLET=$HOME/.config/solana/id.json" >> "$GITHUB_ENV"
          echo "ANCHOR_PROVIDER_URL=${{ secrets.DEVNET_RPC_URL }}" >> "$GITHUB_ENV"

      - name: Run devnet tests
        env:
          TEST_FILTER: ${{ github.event.inputs.test-filter || 'all' }}
          # Node 23+ enables --experimental-strip-types by default, which
          # conflicts with ts-node's CJS loader for .ts imports. Disable it.
          NODE_OPTIONS: "--no-experimental-strip-types"
        run: |
          FILTER="$TEST_FILTER"
          if [ "$FILTER" != "all" ] && [ -f "tests/$FILTER" ]; then
            echo "Running single test file: tests/$FILTER"
            npx ts-mocha -p ./tsconfig.json -t 600000 "tests/$FILTER"
          else
            echo "Running all devnet tests (95 tests, 9 files)"
            npx ts-mocha -p ./tsconfig.json -t 600000 \
              tests/devnet-smoke.ts \
              tests/devnet-sessions.ts \
              tests/devnet-fees.ts \
              tests/devnet-security.ts \
              tests/devnet-spending.ts \
              tests/devnet-transfers.ts \
              tests/devnet-positions.ts \
              tests/devnet-timelock.ts \
              tests/devnet-routing.ts
          fi

      - name: Run Kit SDK devnet tests (dashboard integration)
        working-directory: sdk/kit
        env:
          ANCHOR_PROVIDER_URL: ${{ secrets.DEVNET_RPC_URL }}
        run: |
          npx mocha --require tsx tests/devnet/dashboard-integration.test.ts --timeout 300000

      - name: Cleanup wallet
        if: always()
        run: rm -f "$HOME/.config/solana/id.json"
